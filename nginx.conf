server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão (Cloudflare faz Brotli na borda; deixamos gzip pra cliente direto e fallback)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml application/xml+rss
        image/svg+xml font/woff font/woff2;

    # Headers de segurança (Cloudflare pode adicionar HSTS adicional na borda)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), interest-cohort=()" always;
    add_header X-Robots-Tag "index, follow" always;
    # CSP permissivo o suficiente pra Tesseract/ZXing/Google Fonts/Open Food Facts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://world.openfoodfacts.org https://images.openfoodfacts.org; media-src 'self' blob:; connect-src 'self' https://world.openfoodfacts.org https://unpkg.com; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self';" always;

    # Service Worker: cache zero, escopo raiz (PRECISA estar sempre fresh)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires off;
    }

    # index.html: sempre revalidar (PWA shell — atualização precisa ser detectada)
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Manifest: short cache (muda raramente, mas precisa propagar)
    location = /manifest.json {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # robots.txt + sitemap.xml: dia inteiro
    location = /robots.txt   { add_header Cache-Control "public, max-age=86400" always; }
    location = /sitemap.xml  { add_header Cache-Control "public, max-age=86400" always; }

    # Vendor JS (ZXing pinado por versão): cache longo
    location /vendor/ {
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # CSS/JS principais: revalidar com max-age curto (cache busting via SW)
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # Ícones e fontes: cache longo (mudam só em deploy de nova arte)
    location ~* \.(png|jpg|jpeg|gif|webp|woff|woff2|ttf|ico)$ {
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }
    location ~* \.svg$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # SPA fallback: qualquer rota desconhecida cai no index
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck (sem log, baixo overhead)
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Bloqueia paths comuns de scan (sem inflar logs com 404)
    location ~* /\.(env|git|svn|aws|ssh) { deny all; access_log off; log_not_found off; }
    location ~* /(wp-|wordpress|phpmyadmin) { deny all; access_log off; log_not_found off; }

    server_tokens off;
    error_page 404 /index.html;
}
