server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão pra cortar transferência (Geist/Tesseract são pesados)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml application/xml+rss
        image/svg+xml font/woff font/woff2;

    # Service Worker: cache zero, escopo raiz
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires off;
    }

    # Manifest também sem cache pesado (muda raramente, mas precisa atualizar)
    location = /manifest.json {
        add_header Cache-Control "public, max-age=300" always;
    }

    # Ícone — cache de 1 dia
    location = /icon.svg {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # CSS/JS principais — bater no servidor sempre, mas com 304
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # PNG/JPG/etc — cache longo (não usamos hoje, mas pre-cooked)
    location ~* \.(png|jpg|jpeg|gif|webp|woff|woff2|ttf)$ {
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # SPA fallback — qualquer rota desconhecida cai no index
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Headers de segurança básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Suprime logs de healthcheck pra não poluir
    location = /healthz { access_log off; return 200 "ok"; add_header Content-Type text/plain; }

    # Erros customizados — sem revelar nginx version
    server_tokens off;
    error_page 404 /index.html;
}
